<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IPTV Browser by Voltgizerz</title>

    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/54938467?v=4">
    <link rel="apple-touch-icon" href="https://avatars.githubusercontent.com/u/54938467?v=4">
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React

        function App() {
            const videoRef = useRef(null)
            const hlsRef = useRef(null)

            const [countries, setCountries] = useState([])
            const [categories, setCategories] = useState([])
            const [channels, setChannels] = useState([])
            const [selectedChannel, setSelectedChannel] = useState(null)
            const [filters, setFilters] = useState({
                country: '',
                search: '',
                category: '',
            })
            const [countryOpen, setCountryOpen] = useState(false)
            const [loading, setLoading] = useState(true)
            const [error, setError] = useState('')

            const countriesMap = useMemo(() => {
                return countries.reduce((acc, country) => {
                    acc[country.name] = country.code
                    return acc
                }, {})
            }, [countries])

            const categoriesMap = useMemo(() => {
                return categories.reduce((acc, category) => {
                    acc[category.id] = category.name
                    acc[category.name.toLowerCase()] = category.name
                    return acc
                }, {})
            }, [categories])

            const filteredCountries = useMemo(() => {
                const query = filters.country.trim().toLowerCase()

                return countries
                    .filter(country => {
                        if (!query) {
                            return true
                        }

                        return country.name.toLowerCase().includes(query) ||
                            country.code.toLowerCase().includes(query)
                    })
                    .slice(0, query ? 12 : 6)
            }, [countries, filters.country])

            useEffect(() => {
                async function loadFilters() {
                    try {
                        const [countriesRes, categoriesRes] = await Promise.all([
                            fetch('/api/countries'),
                            fetch('/api/categories'),
                        ])

                        if (!countriesRes.ok || !categoriesRes.ok) {
                            throw new Error('Failed to load filters')
                        }

                        const [countriesData, categoriesData] = await Promise.all([
                            countriesRes.json(),
                            categoriesRes.json(),
                        ])

                        setCountries(countriesData)
                        setCategories(
                            categoriesData.sort((a, b) =>
                                a.name.localeCompare(b.name)
                            )
                        )
                    } catch (err) {
                        setError(err.message)
                    }
                }

                loadFilters()
            }, [])

            useEffect(() => {
                const controller = new AbortController()

                async function loadChannels() {
                    setLoading(true)
                    setError('')

                    const country = countriesMap[filters.country] || ''
                    const params = new URLSearchParams({
                        country,
                        category: filters.category,
                        q: filters.search,
                    })

                    try {
                        const res = await fetch(`/api/channels?${params}`, {
                            signal: controller.signal,
                        })

                        if (!res.ok) {
                            throw new Error('Failed to load channels')
                        }

                        setChannels(await res.json())
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            setError(err.message)
                        }
                    } finally {
                        setLoading(false)
                    }
                }

                loadChannels()

                return () => controller.abort()
            }, [countriesMap, filters])

            useEffect(() => {
                return () => {
                    if (hlsRef.current) {
                        hlsRef.current.destroy()
                    }
                }
            }, [])

            function updateFilter(key, value) {
                setFilters(current => ({
                    ...current,
                    [key]: value,
                }))
            }

            function selectCountry(country) {
                updateFilter('country', country.name)
                setCountryOpen(false)
            }

            async function playChannel(channel) {
                setSelectedChannel(channel)

                const res = await fetch(`/api/stream/${channel.id}`)
                const data = await res.json()
                const video = videoRef.current

                if (!video) {
                    return
                }

                if (hlsRef.current) {
                    hlsRef.current.destroy()
                    hlsRef.current = null
                }

                if (window.Hls && Hls.isSupported()) {
                    hlsRef.current = new Hls()
                    hlsRef.current.loadSource(data.url)
                    hlsRef.current.attachMedia(video)
                } else {
                    video.src = data.url
                }

                video.play()
            }

            function fullscreenPlayer() {
                const video = videoRef.current

                if (video && video.requestFullscreen) {
                    video.requestFullscreen()
                }
            }

            return (
                <div className="app-shell">
                    <aside className="sidebar">
                        <div className="brand">
                            <img
                                className="brand-mark"
                                src="https://avatars.githubusercontent.com/u/54938467?v=4"
                                alt="Voltgizerz logo"
                            />
                            <div>
                                <h1>IPTV Browser</h1>
                                <p>Explore live channels by country and category.</p>
                            </div>
                        </div>

                        <div className="filters">
                            <label
                                className="combo-field"
                                onBlur={e => {
                                    if (!e.currentTarget.contains(e.relatedTarget)) {
                                        setCountryOpen(false)
                                    }
                                }}
                            >
                                <span>Country</span>
                                <div className="combo">
                                    <input
                                        type="search"
                                        value={filters.country}
                                        onFocus={() => setCountryOpen(true)}
                                        onChange={e => {
                                            updateFilter('country', e.target.value)
                                            setCountryOpen(true)
                                        }}
                                        placeholder="Search country..."
                                    />

                                    {filters.country && (
                                        <button
                                            type="button"
                                            className="combo-clear"
                                            onClick={() => {
                                                updateFilter('country', '')
                                                setCountryOpen(true)
                                            }}
                                            aria-label="Clear country"
                                        >
                                            x
                                        </button>
                                    )}

                                    {countryOpen && (
                                        <div className="combo-menu">
                                            {filteredCountries.length === 0 && (
                                                <div className="combo-empty">
                                                    No countries found
                                                </div>
                                            )}

                                            {filteredCountries.map(country => (
                                                <button
                                                    type="button"
                                                    key={country.code}
                                                    className="combo-option"
                                                    onMouseDown={e => e.preventDefault()}
                                                    onClick={() => selectCountry(country)}
                                                >
                                                    <span>{country.name}</span>
                                                    <strong>{country.code}</strong>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </label>

                            <label>
                                <span>Channel</span>
                                <input
                                    type="search"
                                    value={filters.search}
                                    onChange={e => updateFilter('search', e.target.value)}
                                    placeholder="Search channel, network, category..."
                                />
                            </label>

                            <label>
                                <span>Category</span>
                                <input
                                    type="text"
                                    list="categories"
                                    value={filters.category}
                                    onChange={e => updateFilter('category', e.target.value)}
                                    placeholder="Search category..."
                                />
                            </label>

                            <datalist id="categories">
                                {categories.map(category => (
                                    <option key={category.id} value={category.name} />
                                ))}
                            </datalist>
                        </div>

                        <div className="sidebar-meta">
                            <span>{loading ? 'Loading' : `${channels.length} channels`}</span>
                            {error && <span className="error-text">{error}</span>}
                        </div>

                        <div className="channels">
                            {!loading && channels.length === 0 && (
                                <div className="empty-state">
                                    No channels found.
                                </div>
                            )}

                            {channels.map(channel => (
                                <button
                                    type="button"
                                    key={channel.id}
                                    className={
                                        selectedChannel?.id === channel.id
                                            ? 'channel active'
                                            : 'channel'
                                    }
                                    onClick={() => playChannel(channel)}
                                >
                                    <img
                                        src={channel.logo || 'https://placehold.co/60x60?text=TV'}
                                        alt=""
                                        onError={e => {
                                            e.currentTarget.src = 'https://placehold.co/60x60?text=TV'
                                        }}
                                    />

                                    <div className="channel-meta">
                                        <div className="channel-name">
                                            {channel.name}
                                        </div>

                                        <div className="channel-badges">
                                            {(channel.categories || []).map(category => (
                                                <span className="category-badge" key={category}>
                                                    {categoriesMap[category] || category}
                                                </span>
                                            ))}

                                            {channel.is_nsfw && (
                                                <span className="nsfw-badge">NSFW</span>
                                            )}
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </aside>

                    <main className="content">
                        <section className="player-stage">
                            <div className="player-panel">
                                <div className="video-frame">
                                    <video
                                        ref={videoRef}
                                        controls
                                        autoPlay
                                        playsInline
                                    />

                                    <div className="video-placeholder">
                                        <span className="eyebrow">
                                            {selectedChannel ? 'Loading stream' : 'No channel selected'}
                                        </span>
                                        <strong>
                                            {selectedChannel ? selectedChannel.name : 'Choose a channel from the list'}
                                        </strong>
                                    </div>
                                </div>

                                <section className="player-info">
                                    <div>
                                        <span className="eyebrow">
                                            {selectedChannel ? selectedChannel.country : 'Ready'}
                                        </span>
                                        <h2>
                                            {selectedChannel ? selectedChannel.name : 'Select a channel'}
                                            {selectedChannel?.is_nsfw && (
                                                <span className="nsfw-badge">NSFW</span>
                                            )}
                                        </h2>
                                    </div>

                                    <button
                                        type="button"
                                        className="primary-action"
                                        onClick={fullscreenPlayer}
                                    >
                                        Fullscreen
                                    </button>
                                </section>
                            </div>
                        </section>
                    </main>
                </div>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
</body>

</html>
