<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPTV Browser by Voltgizerz</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            IPTV Browser
        </div>

        <input
            type="text"
            id="country"
            list="countries"
            placeholder="Search country..."
        >

        <datalist id="countries"></datalist>

        <input
            type="text"
            id="search"
            placeholder="Search channel or category..."
        />

        <input
            type="text"
            id="category"
            list="categories"
            placeholder="Search category..."
        >

        <datalist id="categories"></datalist>

        <div id="channels" class="channels">
        </div>

    </aside>

    <main class="content">

        <div class="player-wrapper">

            <video
                id="video"
                controls
                autoplay
                playsinline
            ></video>

        </div>

        <div class="player-info">

            <h2 id="channelName">
                Select a channel
            </h2>

            <button onclick="fullscreenPlayer()">
                Fullscreen
            </button>

        </div>

    </main>

</div>

<script>

let hls
let countriesMap = {}
let categoriesMap = {}

function escapeHTML(value) {
    const div = document.createElement('div')
    div.innerText = value || ''

    return div.innerHTML
}

function renderBadges(channel) {
    const categoryBadges = (channel.categories || [])
        .map(category => `
            <span class="category-badge">
                ${escapeHTML(categoriesMap[category] || category)}
            </span>
        `)
        .join('')

    return `
        <div class="channel-badges">
            ${categoryBadges}
            ${channel.is_nsfw ? '<span class="nsfw-badge">NSFW</span>' : ''}
        </div>
    `
}

async function loadCategories() {

    const res = await fetch('/api/categories')
    const data = await res.json()

    categoriesMap = {}

    document.getElementById('categories').innerHTML =
        data
            .sort((a, b) => a.name.localeCompare(b.name))
            .map(category => `
                <option value="${escapeHTML(category.name)}">
            `)
            .join('')

    data.forEach(category => {
        categoriesMap[category.id] = category.name
        categoriesMap[category.name.toLowerCase()] = category.name
    })
}

async function loadCountries() {

    const res = await fetch('/api/countries')
    const data = await res.json()

    const datalist =
        document.getElementById('countries')

    datalist.innerHTML = ""

    data.forEach(country => {

        countriesMap[country.name] =
            country.code

        datalist.innerHTML += `
            <option value="${country.name}">
        `
    })
}

async function loadChannels() {

    const countryInput =
        document.getElementById('country').value

    const country =
        countriesMap[countryInput] || ""

    const search =
        document.getElementById('search').value

    const category =
        document.getElementById('category').value

    const res = await fetch(
        `/api/channels?country=${country}&category=${encodeURIComponent(category)}&q=${encodeURIComponent(search)}`
    )

    const channels = await res.json()

    let html = ""

    channels.forEach(channel => {
        const id = JSON.stringify(channel.id)
        const name = JSON.stringify(channel.name)
        const isNSFW = JSON.stringify(channel.is_nsfw)

        html += `
        <div
            class="channel"
            onclick='playChannel(${id},${name},${isNSFW})'>

            <img
                src="${channel.logo}"
                onerror="this.src='https://placehold.co/60x60?text=TV'"
            >

            <div class="channel-meta">
                <div class="channel-name">
                    ${escapeHTML(channel.name)}
                </div>

                ${renderBadges(channel)}
            </div>

        </div>
        `
    })

    document
        .getElementById('channels')
        .innerHTML = html
}

async function playChannel(id, name, isNSFW) {

    document.getElementById('channelName').innerHTML = `
        ${escapeHTML(name)}
        ${isNSFW ? '<span class="nsfw-badge">NSFW</span>' : ''}
    `

    const res =
        await fetch(`/api/stream/${id}`)

    const data =
        await res.json()

    const video =
        document.getElementById('video')

    if (hls) {
        hls.destroy()
    }

    if (Hls.isSupported()) {

        hls = new Hls()

        hls.loadSource(data.url)

        hls.attachMedia(video)

    } else {

        video.src = data.url
    }

    video.play()
}

function fullscreenPlayer() {

    const video =
        document.getElementById('video')

    if (video.requestFullscreen) {
        video.requestFullscreen()
    }
}

document
    .getElementById('country')
    .addEventListener('input', loadChannels)

document
    .getElementById('search')
    .addEventListener('input', loadChannels)

document
    .getElementById('category')
    .addEventListener('input', loadChannels)

loadCountries()
loadCategories()
loadChannels()

</script>

</body>
</html>
