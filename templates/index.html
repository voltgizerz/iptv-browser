<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IPTV Browser by Voltgizerz</title>

    <link rel="icon" type="image/jpeg" href="/static/icon-512.jpg">
    <link rel="apple-touch-icon" href="/static/icon-512.jpg">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#080a0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="IPTV Browser">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React

        function App() {
            const videoRef = useRef(null)
            const hlsRef = useRef(null)

            // ⚡ OPTIMIZATION CORE
            const streamCache = useRef(new Map())
            const playId = useRef(0)

            const [countries, setCountries] = useState([])
            const [categories, setCategories] = useState([])
            const [channels, setChannels] = useState([])
            const [selectedChannel, setSelectedChannel] = useState(null)

            const [filters, setFilters] = useState({
                country: '',
                search: '',
                category: '',
            })

            const [loading, setLoading] = useState(true)
            const [error, setError] = useState('')
            const [isPlaying, setIsPlaying] = useState(false)

            const categoriesMap = useMemo(() => {
                return categories.reduce((acc, c) => {
                    acc[c.id] = c.name
                    return acc
                }, {})
            }, [categories])

            // =========================
            // LOAD FILTERS
            // =========================
            useEffect(() => {
                async function load() {
                    try {
                        const [c1, c2] = await Promise.all([
                            fetch('/api/countries'),
                            fetch('/api/categories'),
                        ])

                        setCountries(await c1.json())
                        setCategories(await c2.json())
                    } catch (e) {
                        setError(e.message)
                    }
                }

                load()
            }, [])

            // =========================
            // LOAD CHANNELS
            // =========================
            useEffect(() => {
                const controller = new AbortController()

                async function loadChannels() {
                    setLoading(true)

                    try {
                        const params = new URLSearchParams({
                            country: filters.country,
                            category: filters.category,
                            q: filters.search,
                        })

                        const res = await fetch(`/api/channels?${params}`, {
                            signal: controller.signal,
                        })

                        setChannels(await res.json())
                    } catch (e) {
                        if (e.name !== 'AbortError') setError(e.message)
                    } finally {
                        setLoading(false)
                    }
                }

                loadChannels()
                return () => controller.abort()
            }, [filters])

            // =========================
            // PRELOAD NEXT CHANNEL
            // =========================
            function preloadNext(index) {
                const next = channels[index + 1]
                if (!next) return
                if (streamCache.current.has(next.id)) return

                fetch(`/api/stream/${next.id}`)
                    .then(r => r.json())
                    .then(d => {
                        streamCache.current.set(next.id, d.url)
                    })
                    .catch(() => { })
            }

            // =========================
            // PLAY CHANNEL (FIXED + NO DELAY LIVE)
            // =========================
            async function playChannel(channel) {
                playId.current += 1
                const currentPlay = playId.current

                setSelectedChannel(channel)
                setIsPlaying(false)

                const video = videoRef.current

                // ⚡ GET CACHE OR FETCH
                let url = streamCache.current.get(channel.id)

                if (!url) {
                    const res = await fetch(`/api/stream/${channel.id}`)
                    const data = await res.json()
                    url = data.url
                    streamCache.current.set(channel.id, url)
                }

                if (currentPlay !== playId.current) return

                // =========================
                // CLEAN OLD HLS
                // =========================
                if (hlsRef.current) {
                    hlsRef.current.stopLoad()
                    hlsRef.current.detachMedia()
                    hlsRef.current.destroy()
                    hlsRef.current = null
                }

                // =========================
                // INIT HLS (LOW LATENCY + LIVE EDGE FIX)
                // =========================
                if (window.Hls && Hls.isSupported()) {
                    hlsRef.current = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 0,
                        maxBufferLength: 2,
                        liveSyncDurationCount: 1,
                    })

                    hlsRef.current.loadSource(url)
                    hlsRef.current.attachMedia(video)

                    hlsRef.current.on(Hls.Events.MANIFEST_PARSED, () => {
                        if (currentPlay !== playId.current) return

                        // ⚡ FORCE LIVE EDGE (FIX DELAY ISSUE)
                        hlsRef.current.startLoad(-1)

                        setTimeout(() => {
                            try {
                                const seekable = video.seekable
                                if (seekable.length > 0) {
                                    video.currentTime =
                                        seekable.end(seekable.length - 1)
                                }
                            } catch { }
                        }, 500)

                        video.play().catch(() => { })
                        setIsPlaying(true)
                    })
                } else {
                    video.src = url
                    video.play().catch(() => { })
                    setIsPlaying(true)
                }

                // =========================
                // PRELOAD NEXT CHANNEL
                // =========================
                const index = channels.findIndex(c => c.id === channel.id)
                preloadNext(index)
            }

            function fullscreenPlayer() {
                const video = videoRef.current
                video?.requestFullscreen?.()
            }

            // =========================
            // UI (minimal unchanged)
            // =========================
            return (
                <div className="app-shell">
                    <aside className="sidebar">
                        <input
                            placeholder="Search..."
                            onChange={e =>
                                setFilters(f => ({ ...f, search: e.target.value }))
                            }
                        />

                        <div className="channels">
                            {channels.map(c => (
                                <button
                                    key={c.id}
                                    onClick={() => playChannel(c)}
                                    className={
                                        selectedChannel?.id === c.id
                                            ? 'active'
                                            : ''
                                    }
                                >
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    </aside>

                    <main>
                        <video ref={videoRef} controls autoPlay playsInline />

                        {!isPlaying && (
                            <div className="overlay">Loading stream...</div>
                        )}

                        <button onClick={fullscreenPlayer}>Fullscreen</button>
                    </main>
                </div>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
</body>

</html>
